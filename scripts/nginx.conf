##############################################################
# nginx.conf - 本番デプロイ用設定
#
# 構成:
#   / (静的ファイル)  → dashboard/dist/  (統合フロントエンド)
#   /api/*            → localhost:5002   (X-Agent バックエンド)
#   /no9-api/*        → localhost:5003   (No.9 バックエンド)
#
# 配置場所（例: Ubuntu）:
#   sudo cp scripts/nginx.conf /etc/nginx/sites-available/x-agent
#   sudo ln -s /etc/nginx/sites-available/x-agent /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    server_name _;  # ← 独自ドメインがあれば your-domain.com に変更

    # 静的ファイルのルート（dashboard/dist/ の絶対パス）
    root /home/ubuntu/Xエージェント/dashboard/dist;  # ← サーバー上の実際のパスに変更
    index index.html;

    # --------------------------------------------------
    # X-Agent API プロキシ  /api/* → localhost:5002
    # --------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # --------------------------------------------------
    # No.9 API プロキシ  /no9-api/* → localhost:5003 (パス書き換えあり)
    # --------------------------------------------------
    location /no9-api/ {
        rewrite            ^/no9-api/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # --------------------------------------------------
    # フロントエンド SPA ルーティング（React のクライアントサイドルーティング対応）
    # --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 大きなリクエスト（画像・ファイルアップロード）の上限
    client_max_body_size 50M;
}
